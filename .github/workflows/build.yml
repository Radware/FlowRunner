name: FlowRunner Build

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run dist -- --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    # Publish ONLY on a real push/merge to main or master. PR builds and
    # manual (workflow_dispatch) runs build all platforms but never touch
    # the published release.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          VERSION="${{ steps.version.outputs.version }}"

          # macOS - extract DMG and rename
          cp artifacts/macos-latest-build/FlowRunner-${VERSION}-arm64.dmg \
             release/FlowRunnerSetup-arm64-mac-${VERSION}.dmg

          # Windows - zip the NSIS installer
          ls -lh artifacts/windows-latest-build
          cd artifacts/windows-latest-build
          zip ../../release/FlowRunnerSetup-x64-win-${VERSION}.zip "FlowRunner Setup ${VERSION}.exe"
          cd ../..

          # Linux - extract AppImage and rename
          cp artifacts/ubuntu-latest-build/FlowRunner-${VERSION}.AppImage \
             release/FlowRunnerSetup-x64-linux-${VERSION}.AppImage

          ls -lh release/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FlowRunner v${{ steps.version.outputs.version }}
          body_path: release.md
          files: release/*
          make_latest: true
